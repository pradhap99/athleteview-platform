name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  gateway-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gateway
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: gateway/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run lint

  ai-service-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - run: pytest tests/ -v --tb=short

  biometrics-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: biometrics
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - run: pytest tests/ -v --tb=short

  docker-build:
    runs-on: ubuntu-latest
    needs: [gateway-tests, ai-service-tests, biometrics-tests]
    steps:
      - uses: actions/checkout@v4
      - run: docker compose -f docker-compose.yml build
